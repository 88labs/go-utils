name: Test AWS

on:
  push:
    branches:
      - main
    paths:
      - "aws/**"
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - "aws/**"
env:
  testdir : ./aws

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    strategy:
      matrix:
        go-version: [ 1.23.x ]
        os: [ ubuntu-22.04 ]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - name: Install Go
        uses: actions/setup-go@3041bf56c941b39c61721a86cd11f3bb1338122a # v5.2.0
        with:
          go-version: ${{ matrix.go-version }}
      - name: Download Go modules
        working-directory: ${{ env.testdir }}
        shell: bash
        run: go mod download
      - name: Setup Docker
        working-directory: ${{ env.testdir }}
        env:
          DOCKER_BUILDKIT: 1
        run: |
          docker compose up -d --wait --wait-timeout 30
      - name: Test
        working-directory: ${{ env.testdir }}
        run: |
          go install gotest.tools/gotestsum@latest
          # shellcheck disable=SC2046
          gotestsum --packages="./..." --junitfile unit-tests.xml -- -p 4 -parallel 4 -v ./... -race -coverprofile="coverage.txt" -covermode=atomic -coverpkg=./...
      - uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./unit-tests.xml,./coverage.txt
