name: 'Auto Assign'
on:
  pull_request_target:
    types: [opened, ready_for_review]

# Do not perform code checkouts; only allow reviewers/assignees to write.
permissions:
  contents: read
  pull-requests: write

jobs:
  add-reviews:
    runs-on: ubuntu-22.04
    steps:
      - uses: kentaro-m/auto-assign-action@0a2c53d3721e4c5cfcce6afd4014aecc337979f6 # v2.0.2
        with:
          configuration-path: '.github/auto_assign_configs.yaml'
